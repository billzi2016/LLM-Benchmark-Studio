services:
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app/backend
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS:-http://localhost:6332}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:6332}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      VLLM_HOST: ${VLLM_HOST:-localhost}
      VLLM_PORT: ${VLLM_PORT:-8000}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://localhost:8000/v1}
      SGLANG_HOST: ${SGLANG_HOST:-localhost}
      SGLANG_PORT: ${SGLANG_PORT:-30000}
      SGLANG_BASE_URL: ${SGLANG_BASE_URL:-http://localhost:30000/v1}
      OPENAI_COMPATIBLE_HOST: ${OPENAI_COMPATIBLE_HOST:-localhost}
      OPENAI_COMPATIBLE_PORT: ${OPENAI_COMPATIBLE_PORT:-6328}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-http://localhost:6328/v1}
    ports:
      - "${DJANGO_PORT:-6331}:8000"
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "corepack enable && pnpm install --frozen-lockfile --config.confirmModulesPurge=false && pnpm dev --host 0.0.0.0 --port 5173"
    environment:
      CI: "true"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:6331/api}
    ports:
      - "${FRONTEND_PORT:-6332}:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  rabbitmq_data:
  frontend_node_modules:
